<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CheckIP</title>

    <link
      rel="stylesheet"
      nonce="{{ g.nonce }}"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      nonce="{{ g.nonce }}"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap"
    />

    <link
      rel="stylesheet"
      nonce="{{ g.nonce }}"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      nonce="{{ g.nonce }}"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <link
      rel="stylesheet"
      nonce="{{ g.nonce }}"
      href="{{ url_for('static', filename='/css/styles.css') }}"
    />

    <style nonce="{{ g.nonce }}">
      .login-container {
        max-width: 450px;
        margin-top: 5rem;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container bg-light shadow p-5 rounded login-container">
      <div class="mb-5 text-center">
        <h1 class="fw-bold mb-2 tracking-tight">
          <span class="theme-color">Check</span>IP
        </h1>
        <p class="text-muted fs-6 title-font">Login</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 rb-font small mb-4">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
      </div>
      {% endfor %} {% endif %} {% endwith %}

      <div class="table-container">
        <form method="post" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label
              for="username"
              class="form-label fw-medium text-secondary small"
              >Username</label
            >
            <div class="input-group">
              <span class="input-group-text bg-white text-muted border-end-0">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                class="form-control border-start-0 ps-2 rb-font"
                required
                autofocus
              />
            </div>
          </div>

          <div class="mb-4">
            <label
              for="password"
              class="form-label fw-medium text-secondary small"
              >Password</label
            >
            <div class="input-group">
              <span class="input-group-text bg-white text-muted border-end-0">
                <i class="bi bi-shield-lock"></i>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control border-start-0 ps-2 rb-font"
                required
              />
            </div>
          </div>

          <button
            class="fw-bold btn btn-custom w-100 py-2 shadow-sm"
            type="submit"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <script
      nonce="{{ g.nonce }}"
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
