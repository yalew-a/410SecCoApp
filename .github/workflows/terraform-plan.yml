name: Terraform Plan

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    name: Plan CheckIP Infrastructure

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform/infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        env:
          TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}
          TF_VAR_region: ${{ vars.TF_VAR_REGION }}

          # Mock inputs for Secret Manager creation blocks (Prevents interactive prompts - this is causing the workflow to get stuck on Terraform Plan)
          TF_VAR_vt_api_key_value: "placeholder_value"
          TF_VAR_ipdb_api_key_value: "placeholder_value"
          TF_VAR_db_pass_value: "placeholder_value"
          TF_VAR_app_auth_pass: "placeholder_value"

          # Mock inputs for plain-text strings (Prevents interactive prompts)
          TF_VAR_db_user_value: "placeholder_value"
          TF_VAR_db_name_value: "placeholder_value"
          TF_VAR_app_auth_user: "placeholder_value"
          TF_VAR_instance_connection_name_value: "${{ vars.TF_VAR_PROJECT_ID }}:${{ vars.TF_VAR_REGION }}:checkip-mysql"
